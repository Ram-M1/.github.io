<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Оракул — FOCUS</title>
<style>
:root{--accent:#FFD966;--accent-2:#7C8CFF;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#060608;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:12px;}
.phone{width:375px;height:700px;background:linear-gradient(165deg,#131319,#0d0d12);border-radius:52px;box-shadow:0 40px 80px rgba(0,0,0,0.6),0 0 0 8px #1c1c24;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;position:relative;padding:30px;}
.icon{width:72px;height:72px;border-radius:22px;background:radial-gradient(circle at 35% 30%,rgba(255,217,102,0.3),rgba(255,217,102,0.05));border:1px solid rgba(255,217,102,0.3);display:flex;align-items:center;justify-content:center;}
.icon svg{width:36px;height:36px;color:var(--accent);}
.t{font-size:22px;font-weight:700;background:linear-gradient(135deg,#fff 20%,var(--accent) 80%);-webkit-background-clip:text;background-clip:text;color:transparent;text-align:center;}
.s{font-size:13px;color:#9a9aab;text-align:center;line-height:1.5;max-width:260px;}
.back{margin-top:10px;padding:13px 30px;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#0a0a0f;font-weight:700;font-size:14px;cursor:pointer;border:none;}
.back:active{transform:scale(0.97);}

/* PWA-режим (установлено на телефон): на весь реальный экран, без макетной рамки */
@media (display-mode: standalone), (display-mode: fullscreen) {
    html, body { background: var(--bg-1, #0d0d12) !important; padding: 0 !important; overflow: hidden !important; }
    .phone {
        width: 100vw !important;
        height: 100vh !important;
        height: 100dvh !important;
        border-radius: 0 !important;
        box-shadow: none !important;
        padding-top: env(safe-area-inset-top) !important;
        padding-bottom: env(safe-area-inset-bottom) !important;
        max-width: 100vw !important;
    }
    .phone::before, .phone::after { display: none !important; }
    #atmosCanvas, #cosmicCanvas, #medCanvas, #atmos, .atmos-canvas { border-radius: 0 !important; }
    .modal, .slideshow, .session-area { border-radius: 0 !important; }
    #atmosCanvas, #cosmicCanvas, #medCanvas, .atmos-canvas, canvas#atmos {
        width: 100vw !important; height: 100vh !important; height: 100dvh !important;
        position: absolute !important; inset: 0 !important;
    }
}

/* Телефоны: приложение на весь экран без макетной рамки (надёжно, не зависит от PWA-режима) */
@media (max-width: 600px) {
    html, body { background: var(--bg-1, #0d0d12) !important; padding: 0 !important; margin: 0 !important; overflow: hidden !important; min-height: 100vh; min-height: 100dvh; }
    .phone {
        width: 100vw !important;
        max-width: 100vw !important;
        height: 100vh !important;
        height: 100dvh !important;
        border-radius: 0 !important;
        box-shadow: none !important;
        padding-top: env(safe-area-inset-top) !important;
        padding-bottom: env(safe-area-inset-bottom) !important;
    }
    .phone::before, .phone::after { display: none !important; }
    #atmosCanvas, #cosmicCanvas, #medCanvas, .atmos-canvas, canvas#atmos {
        width: 100vw !important; height: 100vh !important; height: 100dvh !important;
        position: absolute !important; inset: 0 !important; border-radius: 0 !important;
    }
    .modal, .slideshow, .session-area { border-radius: 0 !important; }
}
</style></head><body><div class="phone">
<div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></div>
<div class="t">Оракул</div>
<div class="s">Этот раздел в разработке и появится в одном из следующих обновлений.</div>
<button class="back" onclick="location.href='index.html'">На главную</button>
</div></body></html>
